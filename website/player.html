<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Player • Surface Hub</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Core CSS -->
    <link rel="stylesheet" href="css/style.css?v=2.6.5">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5388885815887025" crossorigin="anonymous"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.3);
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .player-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .player-container {
                grid-template-columns: 1fr;
            }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-wrapper {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .video-info {
            padding: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ad-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.8rem;
            min-height: 100px;
            text-align: center;
            overflow: hidden;
        }

        .ad-top { width: 100%; min-height: 90px; margin-bottom: 20px; }
        .ad-bottom { width: 100%; min-height: 250px; margin-top: 20px; }
        .ad-side { width: 300px; min-height: 600px; }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(-5px);
        }
    </style>
</head>
<body>

    <!-- 🏙️ TOP AD -->
    <div class="ad-container ad-top">
        <!-- AdSense Auto/Manual Unit -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-5388885815887025"
             data-ad-slot="TOP_AD_SLOT_ID"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        <span style="position: absolute; pointer-events: none;">ADVERTISEMENT</span>
    </div>

    <div class="player-container">
        <div class="main-content">
            <a href="watch.html" class="btn-back">
                <i class="fas fa-arrow-left"></i> Back to Hub
            </a>

            <div class="video-wrapper">
                <div id="player-loading" class="loader">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                </div>
                <video id="main-video" controls autoplay>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="video-info">
                <h1 id="video-title" class="video-title">Loading Preview...</h1>
                <p id="video-desc" style="color: #888; line-height: 1.6;">Please wait while we prepare your intelligence feed.</p>
            </div>

            <!-- 🏙️ MID/BOTTOM AD -->
            <div class="ad-container ad-bottom">
                 <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-5388885815887025"
                     data-ad-slot="BOTTOM_AD_SLOT_ID"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                <span style="position: absolute; pointer-events: none;">ADVERTISEMENT</span>
            </div>
        </div>

        <aside class="sidebar">
            <!-- 🏙️ SIDEBAR AD -->
            <div class="ad-container ad-side">
                 <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-5388885815887025"
                     data-ad-slot="SIDE_AD_SLOT_ID"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                <span style="position: absolute; pointer-events: none;">ADVERTISEMENT</span>
            </div>
        </aside>
    </div>

    <!-- Firebase (for data loading) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        const videoEl = document.getElementById('main-video');
        const titleEl = document.getElementById('video-title');
        const descEl  = document.getElementById('video-desc');

        if (videoId) {
            // Load specific video from Firebase
            const videoRef = firebase.database().ref(`watch_posts/${videoId}`);
            videoRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data) {
                    videoEl.src = data.video_url;
                    titleEl.innerText = data.title || "Intelligence Stream";
                    descEl.innerText = data.description || "Premium hub content for authorized members.";
                    document.title = `${data.title} • Surface Player`;
                } else {
                    titleEl.innerText = "Video Not Found";
                    descEl.innerText = "The requested intelligence feed has expire or been moved.";
                }
            }).catch(err => {
                console.error("Firebase load error:", err);
                titleEl.innerText = "Connection Error";
            });
        } else {
            // Fallback: Check for 'v' parameter (direct URL)
            const directUrl = urlParams.get('v');
            if (directUrl) {
                videoEl.src = directUrl;
                titleEl.innerText = "Live Stream Preview";
            } else {
                titleEl.innerText = "No Intelligence Feed Selected";
            }
        }
    </script>
</body>
</html>
