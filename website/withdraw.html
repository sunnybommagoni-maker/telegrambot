<script src="js/navigation.js?v=2.6.0"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('user_id');
const db = firebase.database();
let currentBalance = 0;
if (userId) {
db.ref(`users/${userId}`).on('value', (snapshot) => {
const user = snapshot.val();
if (user) {
currentBalance = user.balance || 0;
document.getElementById('user-balance').innerText = `₹${currentBalance}`;
}
});
}
document.getElementById('withdraw-btn').onclick = () => {
const amount = parseFloat(document.getElementById('withdraw-amount').value);
const upi = document.getElementById('upi-id').value;
const status = document.getElementById('withdraw-status');
if (isNaN(amount) || amount < 200) {
status.innerText = "❌ Minimum ₹200 required.";
status.style.color = "red";
status.style.display = "block";
return;
}
if (!upi) {
status.innerText = "❌ Enter UPI ID.";
status.style.color = "red";
status.style.display = "block";
return;
}
if (amount > currentBalance) {
status.innerText = "❌ Insufficient balance.";
status.style.color = "red";
status.style.display = "block";
return;
}
// Process (In a real app, logic would go to firebase)
status.innerText = "✅ Withdrawal request sent to your bot!";
status.style.color = "green";
status.style.display = "block";
// Simulating bot sync
// db.ref(`withdrawals`).push({ user_id: userId, amount: amount, upi: upi, status: 'pending' });
};
});
</script>
