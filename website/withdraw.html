<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw Hub • Surface Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=2.6.5">
    <link rel="stylesheet" href="css/responsive.css?v=2.6.5">
</head>
<body>
    <!-- 🏙️ GLOBAL AD CONTAINERS -->
    <div id="ad-portal-top" class="ad-top"></div>

<div id="header-target"></div>
<!-- 🚀 MAXIMIZE ADS: TOP BORDER AD -->
<div style="margin: 1rem 0; text-align:center; overflow:hidden;">
</div>
<main class="main-layout">
<section class="portal-main">
<div class="portal-section" style="padding: 2.5rem; background: linear-gradient(135deg, #ffffff, #fff1f2); border-bottom: 3px solid #f43f5e;">
<h1 style="font-weight: 900; font-size: 2.2rem; letter-spacing: -1px;">Hub Payouts</h1>
<p style="color: var(--text-muted);">Secure and fast withdrawal portal for Surface Hub partners.</p>
</div>
<div class="portal-section" style="margin-top: 2rem; background: #fff; border: 1px solid var(--border); padding: 3rem;">
<div style="text-align: center; margin-bottom: 2rem;">
<div id="user-balance" style="font-size: 3rem; font-weight: 900; color: #f43f5e; margin: 10px 0;">₹0.00</div>
<span style="font-size: 0.8rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase;">Current Payout Surplus</span>
</div>
<div style="background: #fdf2f8; padding: 20px; border-radius: 12px; border: 1px dashed #f43f5e; margin-bottom: 2rem;">
<h3 style="font-weight: 900; margin-bottom: 10px; color: #9d174d;">⚠️ Minimum Withdrawal: ₹200</h3>
<p style="font-size: 0.9rem; color: #9d174d;">Auto-payouts are processed within 24 hours for activated portal accounts.</p>
</div>
<div style="display: flex; flex-direction: column; gap: 15px;">
<input type="number" id="withdraw-amount" placeholder="Enter Amount (min ₹200)" style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); font-size: 1.1rem;">
<input type="text" id="upi-id" placeholder="Enter UPI ID (e.g. user@okaxis)" style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); font-size: 1.1rem;">
<button id="withdraw-btn" style="background: #f43f5e; color: #fff; border: none; padding:18px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.3s;">
FINALIZE WITHDRAWAL
</button>
<p id="withdraw-status" style="text-align: center; margin-top: 10px; font-weight: 800; display: none;"></p>
</div>
</div>
<div id="ad-portal-middle" class="ad-middle ad-inline"></div>

<!-- Ad Slot inside content -->
<div style="margin: 2rem 0;">
</div>
</section>
<!-- Sidebar Layout --><aside class="portal-sidebar">
    <div id="ad-portal-side" class="ad-sidebar"></div>

    <div id="sidebar-target"></div>
</aside>
</main>
<div id="footer-target"></div>

<div id="ad-portal-bottom" class="ad-bottom"></div>

<script src="js/navigation.js?v=2.6.0"></script>
<script src="js/ads-manager.js?v=1.0.0"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('user_id');
const db = firebase.database();
let currentBalance = 0;
if (userId) {
db.ref(`users/${userId}`).on('value', (snapshot) => {
const user = snapshot.val();
if (user) {
currentBalance = user.balance || 0;
document.getElementById('user-balance').innerText = `₹${currentBalance}`;
}
});
}
document.getElementById('withdraw-btn').onclick = () => {
const amount = parseFloat(document.getElementById('withdraw-amount').value);
const upi = document.getElementById('upi-id').value;
const status = document.getElementById('withdraw-status');
if (isNaN(amount) || amount < 200) {
status.innerText = "❌ Minimum ₹200 required.";
status.style.color = "red";
status.style.display = "block";
return;
}
if (!upi) {
status.innerText = "❌ Enter UPI ID.";
status.style.color = "red";
status.style.display = "block";
return;
}
if (amount > currentBalance) {
status.innerText = "❌ Insufficient balance.";
status.style.color = "red";
status.style.display = "block";
return;
}
// Process (In a real app, logic would go to firebase)
status.innerText = "✅ Withdrawal request sent to your bot!";
status.style.color = "green";
status.style.display = "block";
// Simulating bot sync
// db.ref(`withdrawals`).push({ user_id: userId, amount: amount, upi: upi, status: 'pending' });
};
});
</script>
</body>
</html>
