<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard • Surface Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        :root {
            --p: #0076ff;
            --p-dark: #0056b3;
            --bg: #05070a;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: rgba(255, 255, 255, 0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
        }

        .refresh-btn {
            background: var(--p);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }

        .refresh-btn:hover {
            background: var(--p-dark);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .metric-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: 0.3s;
        }

        .metric-card:hover {
            border-color: var(--p);
            box-shadow: 0 0 20px rgba(0, 118, 255, 0.1);
        }

        .metric-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .metric-sub {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--p), var(--success));
            border-radius: 10px;
            transition: width 0.3s;
        }

        .section {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section h2 {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
        }

        .referral-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .referral-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
        }

        .referral-user {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .referral-progress {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .spinner {
            border: 2px solid var(--border);
            border-top-color: var(--p);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .badge-active {
            background: var(--success);
            color: #000;
        }

        .badge-pending {
            background: var(--warning);
            color: #000;
        }

        .badge-inactive {
            background: var(--danger);
            color: #fff;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5388885815887025" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Your Dashboard</h1>
            <button class="refresh-btn" onclick="UserDashboard.refresh()">🔄 Refresh</button>
        </div>

        <!-- Main Metrics -->
        <div class="dashboard-grid" id="metrics-grid">
            <div class="loading"><div class="spinner"></div>Loading dashboard...</div>
        </div>

        <!-- Task Progress Section -->
        <div class="section">
            <h2>📊 Task Earnings Progress</h2>
            <div id="task-progress">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Earnings Breakdown -->
        <div class="section">
            <h2>💰 Earnings Breakdown</h2>
            <div id="earnings-breakdown">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Referral Network -->
        <div class="section">
            <h2>🤝 My Referral Network</h2>
            <div id="referrals-section">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Withdrawal Status -->
        <div class="section">
            <h2>💸 Withdrawal Status</h2>
            <div id="withdrawal-status">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script src="js/user-dashboard.js"></script>
</body>
</html>
