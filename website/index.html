<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surface Hub Portal • Real-Time Global Information</title>
    <!-- Premium Typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Portal Glass System (With ULTRA Cache Busting) -->
    <link rel="stylesheet" href="css/style.css?v=2.6.5">
    <link rel="stylesheet" href="css/responsive.css?v=2.6.5">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5388885815887025" crossorigin="anonymous"></script>
</head>

<body data-version="2.5.0">
    <!-- 🏙️ GLOBAL AD CONTAINERS -->
    <div id="ad-portal-top" class="ad-top"></div>

    <div id="header-target"></div>
    <main class="main-layout">
        <section class="portal-main">
            <div class="portal-section"
                style="padding: 3rem 2rem; text-align: center; background: linear-gradient(135deg, #ffffff, #f0f7ff); border-bottom: 4px solid var(--p);">
                <h1
                    style="font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 900; letter-spacing: -3px; margin-bottom: 1.5rem; line-height: 0.95;">
                    The Ultimate Live Portal.</h1>
                <p
                    style="color: var(--text-muted); max-width: 750px; margin: 0 auto; font-size: 1.25rem; font-weight: 400;">
                    Explore verified world news, gaming intelligence, and real-time records. Unified and synced across
                    the Surface Hub global network.</p>
                <div style="margin-top: 2.5rem; display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap;">
                    <span
                        style="padding: 10px 22px; border-radius: 50px; background: #dbeafe; color: #1e40af; font-weight: 850; font-size: 0.85rem; box-shadow: 0 4px 12px rgba(30, 64, 175, 0.1);">🚨
                        2.5.0 ACTIVE</span>
                    <span
                        style="padding: 10px 22px; border-radius: 50px; background: #d1fae5; color: #065f46; font-weight: 850; font-size: 0.85rem; box-shadow: 0 4px 12px rgba(6, 95, 70, 0.1);">✅
                        PORTAL SYNCED</span>
                </div>
            </div>
            <div class="section-title">
                <i class="fas fa-satellite-dish" style="color: var(--p);"></i> Live Records Feed
            </div>

            <div id="ad-portal-middle" class="ad-middle ad-inline"></div>


            <div class="content-grid">
                <div class="portal-card skeleton" style="height: 400px;"></div>
                <div class="portal-card skeleton" style="height: 400px;"></div>
                <div class="portal-card skeleton" style="height: 400px;"></div>
            </div>
        </section>
        <aside class="portal-sidebar">
            <div id="ad-portal-side" class="ad-sidebar"></div>

            <div id="sidebar-target"></div>
        </aside>
    </main>
    <div id="footer-target"></div>

    <div id="ad-portal-bottom" class="ad-bottom"></div>


    <!-- Portal Ecosystem Architecture -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="js/navigation.js?v=2.5.5"></script>
    <script src="js/realtime.js?v=2.5.5"></script>
    <script src="js/ads-manager.js?v=1.0.0"></script>
    <script src="js/earn-system.js?v=1.0.0"></script>

    <script>
        (function () {
            console.log("Portal Hub: Real-time branding active.");
        })();
    </script>
</body>

</html>
