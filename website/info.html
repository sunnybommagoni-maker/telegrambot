<script src="js/navigation.js?v=2.6.0"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('user_id');
if (userId) {
const db = firebase.database();
db.ref(`users/${userId}`).on('value', (snapshot) => {
const user = snapshot.val();
if (user) {
document.getElementById('user-balance').innerText = `₹${user.balance || 0}`;
document.getElementById('user-ads').innerText = user.ads_watched || 0;
document.getElementById('user-tasks').innerText = user.tasks_done || 0;
}
});
}
});
</script>
