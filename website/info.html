<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wallet • Surface Hub Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="css/responsive.css?v=2.6.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5388885815887025" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 🏙️ GLOBAL AD CONTAINERS -->
    <div id="ad-portal-top" class="ad-top"></div>

<div id="header-target"></div>
<!-- 🚀 MAXIMIZE ADS: TOP BORDER AD -->
<div style="margin: 1rem 0; text-align:center; overflow:hidden;">
</div>
<main class="main-layout">
<section class="portal-main">
<div class="portal-section" style="padding: 2.5rem; background: linear-gradient(135deg, #ffffff, #f0f9ff); border-bottom: 3px solid #0ea5e9;">
<h1 style="font-weight: 900; font-size: 2.2rem; letter-spacing: -1px;">My Portal Wallet</h1>
<p style="color: var(--text-muted);">Real-time balance synchronization with the Surface Hub ecosystem.</p>
</div>
<div class="portal-section" style="margin-top: 2rem; background: #fff; border: 1px solid var(--border); text-align: center; padding: 3rem;">
<div style="font-size: 0.8rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Total Balance</div>
<div id="user-balance" style="font-size: 4rem; font-weight: 900; color: #0ea5e9; margin: 10px 0;">₹0.00</div>
<div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
<div style="text-align: left;">
<span style="display:block; font-size: 0.7rem; color: var(--text-muted);">ADS WATCHED</span>
<b id="user-ads" style="font-size: 1.2rem;">0</b>
</div>
<div style="text-align: left;">
<span style="display:block; font-size: 0.7rem; color: var(--text-muted);">TASKS DONE</span>
<b id="user-tasks" style="font-size: 1.2rem;">0</b>
</div>
</div>
<button onclick="location.href='withdraw.html'" style="margin-top: 30px; background: #0ea5e9; color: #fff; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 1.1rem; width: 100%; max-width: 300px;">
REQUEST WITHDRAWAL
</button>
</div>
<div id="ad-portal-middle" class="ad-middle ad-inline"></div>

<!-- Ad Slot inside content -->
<div style="margin: 2rem 0;">
</div>

<!-- 📰 UNIVERSAL AI NEWS FEED -->
<div class="portal-section" style="margin-top: 2rem;">
    <h3 style="font-weight: 900; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
        <i class="fas fa-newspaper" style="color: #f59e0b;"></i> Real-time Portal Sweep
    </h3>
    <div class="content-grid">
        <!-- AI News will be injected here by realtime.js -->
    </div>
</div>
</section>
<!-- Sidebar Layout --><aside class="portal-sidebar">
    <div id="ad-portal-side" class="ad-sidebar"></div>

    <div id="sidebar-target"></div>
</aside>
</main>
<div id="footer-target"></div>

<div id="ad-portal-bottom" class="ad-bottom"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="js/navigation.js?v=2.6.0"></script>
<script src="js/realtime.js?v=2.5.5"></script>
<script src="js/ads-manager.js?v=1.0.0"></script>
<script src="js/earn-system.js?v=1.0.0"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('user_id');
if (userId) {
const db = firebase.database();
db.ref(`users/${userId}`).on('value', (snapshot) => {
const user = snapshot.val();
if (user) {
document.getElementById('user-balance').innerText = `₹${user.balance || 0}`;
document.getElementById('user-ads').innerText = user.ads_watched || 0;
document.getElementById('user-tasks').innerText = user.tasks_done || 0;
}
});
}
});
</script>
</body>
</html>
