<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script src="js/navigation.js?v=2.5.5"></script>
<script src="js/realtime.js?v=2.5.5"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id');
    const userId = urlParams.get('user_id');
    const reward = urlParams.get('reward') || 10;
    
    if (itemId) {
        const db = firebase.database();
        db.ref(`content/${itemId}`).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.title = `${data.title} • Surface Hub Portal`;
                document.getElementById('article-title').innerText = data.title;
                document.getElementById('article-category').innerText = data.category || data.type || 'Portal Feed';
                document.getElementById('article-image').style.backgroundImage = `url('${data.image || data.thumbnail || 'https://source.unsplash.com/1200x800/?news'}')`;
                
                // 💎 DYNAMIC AD SWARMER
                const articleContainer = document.getElementById('article-content');
                const rawContent = data.content || data.description || 'Accessing portal records...';
                
                // Provided Ads Array
                const adScripts = [
                    { key: '4c130fd19d0381c4f42d8cdf70579cad', format: 'iframe', height: 250, width: 300 }, // 300x250
                    { key: 'd433d0b2a48765d197c04d4941789acb', format: 'iframe', height: 50, width: 320 },  // 320x50
                    { type: 'cpm', src: 'https://pl29071707.profitablecpmratenetwork.com/78/7c/78/787c786a9cb2487ccb9000abb92ae3f1.js' } // ProfitableCPM
                ];

                if (rawContent.includes('[AD_SLOT]')) {
                    articleContainer.innerHTML = ''; // Clear
                    const parts = rawContent.split('[AD_SLOT]');
                    
                    parts.forEach((part, index) => {
                        // 1. Add Paragraph
                        const p = document.createElement('div');
                        p.className = 'paragraph-block';
                        p.style.marginBottom = '20px';
                        p.innerHTML = part.replace(/\n/g, '<br>');
                        articleContainer.appendChild(p);

                        // 2. Inject Ad if not the last part
                        if (index < parts.length - 1) {
                            const ad = adScripts[index % adScripts.length];
                            const adWrap = document.createElement('div');
                            adWrap.className = 'ad-injection-slot';
                            adWrap.style.margin = '25px 0';
                            adWrap.style.textAlign = 'center';
                            adWrap.id = `ad-slot-${index}`;
                            articleContainer.appendChild(adWrap);

                            // Dynamically load the script
                            if (ad.type === 'cpm') {
                                const s = document.createElement('script');
                                s.src = ad.src;
                                adWrap.appendChild(s);
                            } else {
                                const s1 = document.createElement('script');
                                s1.innerHTML = `atOptions = { 'key' : '${ad.key}', 'format' : '${ad.format}', 'height' : ${ad.height}, 'width' : ${ad.width}, 'params' : {} };`;
                                const s2 = document.createElement('script');
                                s2.src = `https://www.highperformanceformat.com/${ad.key}/invoke.js`;
                                adWrap.appendChild(s1);
                                adWrap.appendChild(s2);
                            }
                        }
                    });
                } else {
                    articleContainer.innerHTML = `<p>${rawContent.replace(/\n/g, '<br>')}</p>`;
                }
                
                // 🎥 EMBED VIDEO IF EXISTS
                if (data.videoUrl) {
                    embedVideo(data.videoUrl);
                }
                
                // 📤 SETUP SHARE BUTTONS
                if (data.shareOptions) {
                    setupShareButtons(data, itemId);
                }
                
                startVerifyingTimer();
            }
        });
    }
    
    // 🎥 VIDEO EMBEDDING FUNCTION
    function embedVideo(videoUrl) {
        const videoContainer = document.getElementById('video-container');
        const videoEmbed = document.getElementById('video-embed');
        
        if (!videoContainer || !videoEmbed) return;
        
        let embedCode = '';
        
        // YouTube Detection
        if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
            let videoId = '';
            if (videoUrl.includes('youtube.com')) {
                const url = new URL(videoUrl);
                videoId = url.searchParams.get('v');
            } else if (videoUrl.includes('youtu.be')) {
                videoId = videoUrl.split('/').pop();
            }
            
            if (videoId) {
                embedCode = `
                    <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" 
                        src="https://www.youtube.com/embed/${videoId}" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                `;
            }
        }
        // Vimeo Detection
        else if (videoUrl.includes('vimeo.com')) {
            const videoId = videoUrl.split('/').pop();
            embedCode = `
                <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" 
                    src="https://player.vimeo.com/video/${videoId}" 
                    frameborder="0" 
                    allow="autoplay; fullscreen; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        }
        // Generic HTML5 video
        else if (videoUrl.includes('.mp4') || videoUrl.includes('.webm') || videoUrl.includes('.ogg')) {
            embedCode = `
                <video style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain;" 
                    controls>
                    <source src="${videoUrl}">
                    Your browser does not support the video tag.
                </video>
            `;
        }
        
        if (embedCode) {
            videoEmbed.innerHTML = embedCode;
            videoContainer.style.display = 'block';
        }
    }
    
    // 📤 SETUP SHARE BUTTONS with ShrinkEarn Shortlinks
    async function setupShareButtons(data, itemId) {
        const shareContainer = document.getElementById('share-buttons');
        
        if (!shareContainer) return;
        
        const baseUrl = window.location.origin;
        const pageUrl = `${baseUrl}/article.html?id=${itemId}`;
        const title = encodeURIComponent(data.title || 'Check this out on Surface Hub');
        const description = encodeURIComponent(data.summary || data.description || 'Amazing content on Surface Hub');
        
        // 🔗 SHORTEN THE URL using ShrinkEarn
        let shortUrl = pageUrl;
        const loadingMsg = document.createElement('p');
        loadingMsg.style.cssText = 'font-size: 0.8rem; color: #888; text-align: center;';
        loadingMsg.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating share links...';
        shareContainer.appendChild(loadingMsg);
        
        try {
            if (window.ShortlinkService) {
                console.log("📤 Shortening URL for social sharing...");
                shortUrl = await window.ShortlinkService.getShortUrl(pageUrl);
                console.log("✅ Shortened URL:", shortUrl);
            }
        } catch (e) {
            console.warn("Could not shorten URL, using original:", e);
            shortUrl = pageUrl;
        }
        
        // Remove loading message
        shareContainer.removeChild(loadingMsg);
        
        // Share URLs with shortened link
        const shareUrls = {
            facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shortUrl)}`,
            twitter: `https://twitter.com/intent/tweet?url=${encodeURIComponent(shortUrl)}&text=${title}`,
            whatsapp: `https://api.whatsapp.com/send?text=${encodeURIComponent(data.title + ' ' + shortUrl)}`,
            telegram: `https://t.me/share/url?url=${encodeURIComponent(shortUrl)}&text=${title}`
        };
        
        // Update buttons based on share options
        if (data.shareOptions.facebook) {
            document.getElementById('share-facebook').href = shareUrls.facebook;
        } else {
            document.getElementById('share-facebook').style.display = 'none';
        }
        
        if (data.shareOptions.twitter) {
            document.getElementById('share-twitter').href = shareUrls.twitter;
        } else {
            document.getElementById('share-twitter').style.display = 'none';
        }
        
        if (data.shareOptions.whatsapp) {
            document.getElementById('share-whatsapp').href = shareUrls.whatsapp;
        } else {
            document.getElementById('share-whatsapp').style.display = 'none';
        }
        
        if (data.shareOptions.telegram) {
            document.getElementById('share-telegram').href = shareUrls.telegram;
        } else {
            document.getElementById('share-telegram').style.display = 'none';
        }
        
        // Show share buttons if at least one is enabled
        if (data.shareOptions.facebook || data.shareOptions.twitter || data.shareOptions.whatsapp || data.shareOptions.telegram) {
            shareContainer.style.display = 'block';
        }
    }
    
    function startVerifyingTimer() {
        let timeLeft = 15;
        const timerBar = document.getElementById('timer-progress');
        const timerText = document.getElementById('timer-text');
        const claimBtn = document.getElementById('claimRewardBtn');
        const interval = setInterval(() => {
            timeLeft--;
            const progress = ((15 - timeLeft) / 15) * 100;
            if(timerBar) timerBar.style.width = `${progress}%`;
            if(timerText) timerText.innerText = `Verifying Records: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                if(timerText) timerText.innerText = "✅ Record Verified!";
                if(claimBtn) {
                    claimBtn.disabled = false;
                    claimBtn.style.opacity = "1";
                    claimBtn.style.background = "#0076ff";
                    claimBtn.style.cursor = "pointer";
                    claimBtn.innerText = "Sync Hub Credits Now";
                    claimBtn.onclick = () => {
                        if (window.HubPayout) {
                            window.HubPayout.claim(userId, reward);
                        }
                    };
                }
            }
        }, 1000);
    }
});
</script>
