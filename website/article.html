<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Article Portal • Surface Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=2.6.5">
    <link rel="stylesheet" href="css/responsive.css?v=2.6.5">
</head>
<body>
    <!-- 🏙️ GLOBAL AD CONTAINERS -->
    <div id="ad-portal-top" class="ad-top"></div>

<div id="header-target"></div>

<main class="main-layout">
<section class="portal-main">
<div class="portal-section">
<div id="article-category" style="background: var(--p); color:#fff; display:inline-block; padding: 5px 15px; border-radius: 5px; font-weight: 800; font-size: 0.75rem; margin-bottom: 1.5rem; text-transform: uppercase;">Portal Feed</div>
<h1 id="article-title" style="font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; line-height: 1.1; margin-bottom: 2rem;">Loading Hub Records...</h1>
<div id="article-image" style="width: 100%; height: 400px; border-radius: 16px; background-size: cover; background-position: center; margin-bottom: 2.5rem; background-color: #f1f5f9; box-shadow: var(--shadow);"></div>

<!-- 🎥 VIDEO EMBED SECTION -->
<div id="video-container" style="display: none; width: 100%; margin-bottom: 2.5rem; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow);">
    <div id="video-embed" style="position: relative; width: 100%; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000;"></div>
</div>

<!-- 📤 SOCIAL SHARE BUTTONS -->
<div id="share-buttons" style="display: none; margin: 2rem 0; padding: 1.5rem; background: #f8fafc; border-radius: 12px; border: 1px solid var(--border);">
    <p style="font-weight: 800; margin-bottom: 1rem; color: var(--text);">Share This Article:</p>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a id="share-facebook" href="#" target="_blank" style="flex: 1; min-width: 120px; padding: 10px; border-radius: 8px; background: #1877F2; color: #fff; text-align: center; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;"><i class="fab fa-facebook-square"></i> Facebook</a>
        <a id="share-twitter" href="#" target="_blank" style="flex: 1; min-width: 120px; padding: 10px; border-radius: 8px; background: #1D9BF0; color: #fff; text-align: center; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;"><i class="fab fa-twitter"></i> Twitter</a>
        <a id="share-whatsapp" href="#" target="_blank" style="flex: 1; min-width: 120px; padding: 10px; border-radius: 8px; background: #25D366; color: #fff; text-align: center; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        <a id="share-telegram" href="#" target="_blank" style="flex: 1; min-width: 120px; padding: 10px; border-radius: 8px; background: #0088cc; color: #fff; text-align: center; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;"><i class="fab fa-telegram"></i> Telegram</a>
    </div>
</div>

<div id="ad-portal-middle" class="ad-middle ad-inline"></div>


<div id="article-content" style="font-size: 1.2rem; color: #334155; line-height: 1.8;">
    <p class="skeleton" style="height: 20px; width: 90%; margin-bottom: 1rem;"></p>
    <p class="skeleton" style="height: 20px; width: 95%; margin-bottom: 1rem;"></p>
    <p class="skeleton" style="height: 20px; width: 85%; margin-bottom: 1rem;"></p>
</div>

<hr style="border: 0; border-top: 1px solid var(--border); margin: 3rem 0;">

<!-- PREMIUM REWARD SYSTEM -->
<div class="portal-section" style="background: #f8fafc; border-color: var(--p); text-align:center;">
    <h2 style="font-weight: 900; margin-bottom: 1rem;">💎 Verify Hub Record</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Read to the end to synchronize this record with your Digital Hub balance.</p>
    <div id="timer-box" style="margin-bottom: 2rem;">
        <div id="timer-bar" style="width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin-bottom: 10px;">
            <div id="timer-progress" style="width: 0%; height: 100%; background: var(--p); transition: width 1s linear;"></div>
        </div>
        <span id="timer-text" style="font-weight: 800; color: var(--p);">Verifying Records: 15s</span>
    </div>
    <button id="claimRewardBtn" class="btn-claim" disabled style="opacity: 0.5; background: #94a3b8; cursor: not-allowed; border:none; color:#fff; width:100%; padding:1.2rem; border-radius:12px; font-weight:800;">Wait to Verify Record</button>
</div>
</div>
</section>

<aside class="portal-sidebar">
    <div id="ad-portal-side" class="ad-sidebar"></div>

</aside>
</main>

<div id="footer-target"></div>

<div id="ad-portal-bottom" class="ad-bottom"></div>


<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="js/navigation.js?v=2.5.5"></script>
<script src="js/realtime.js?v=2.5.5"></script>
<script src="js/ads-manager.js?v=1.0.0"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id');
    const userId = urlParams.get('user_id');
    const reward = urlParams.get('reward') || 10;
    
    if (itemId) {
        const db = firebase.database();
        db.ref(`content/${itemId}`).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.title = `${data.title} • Surface Hub Portal`;
                document.getElementById('article-title').innerText = data.title;
                document.getElementById('article-category').innerText = data.category || data.type || 'Portal Feed';
                document.getElementById('article-image').style.backgroundImage = `url('${data.image || data.thumbnail || 'https://source.unsplash.com/1200x800/?news'}')`;
                
                // 💎 DYNAMIC AD SWARMER
                const articleContainer = document.getElementById('article-content');
                const rawContent = data.content || data.description || 'Accessing portal records...';
                
                const adScripts = [
                    { key: '4c130fd19d0381c4f42d8cdf70579cad', format: 'iframe', height: 250, width: 300 }, 
                    { key: 'bfb9ddbec7e3e5681a5312f48a68bb2e', format: 'iframe', height: 90, width: 728 },
                    { key: 'e92210dbd77db33df4ffd95395c4c63a', format: 'iframe', height: 60, width: 468 },
                    { key: 'd433d0b2a48765d197c04d4941789acb', format: 'iframe', height: 50, width: 320 },
                    { type: 'cpm', src: 'https://pl29071710.profitablecpmratenetwork.com/dafa116820cb26f5e3dc4219757633bf/invoke.js' },
                    { type: 'cpm', src: 'https://pl29071708.profitablecpmratenetwork.com/be/d4/a7/bed4a7d2f891321adb05fbd064bb1832.js' },
                    { type: 'cpm', src: 'https://pl29071707.profitablecpmratenetwork.com/78/7c/78/787c786a9cb2487ccb9000abb92ae3f1.js' }
                ];


                if (rawContent.includes('[AD_SLOT]')) {
                    articleContainer.innerHTML = '';
                    const parts = rawContent.split('[AD_SLOT]');
                    
                    parts.forEach((part, index) => {
                        const p = document.createElement('div');
                        p.className = 'paragraph-block';
                        p.style.marginBottom = '20px';
                        p.innerHTML = part.replace(/\n/g, '<br>');
                        articleContainer.appendChild(p);

                        if (index < parts.length - 1) {
                            const ad = adScripts[index % adScripts.length];
                            const adWrap = document.createElement('div');
                            adWrap.className = 'ad-injection-slot';
                            adWrap.style.margin = '35px 0';
                            adWrap.style.textAlign = 'center';
                            articleContainer.appendChild(adWrap);

                            if (ad.type === 'cpm') {
                                const s = document.createElement('script');
                                s.src = ad.src;
                                adWrap.appendChild(s);
                            } else {
                                const s1 = document.createElement('script');
                                s1.innerHTML = `window.atOptions = { 'key' : '${ad.key}', 'format' : '${ad.format}', 'height' : ${ad.height}, 'width' : ${ad.width}, 'params' : {} };`;
                                const s2 = document.createElement('script');
                                s2.src = `https://www.highperformanceformat.com/${ad.key}/invoke.js`;
                                adWrap.appendChild(s1);
                                adWrap.appendChild(s2);
                            }
                        }
                    });
                } else {
                    articleContainer.innerHTML = `<p>${rawContent.replace(/\n/g, '<br>')}</p>`;
                }
                
                if (data.videoUrl) embedVideo(data.videoUrl);
                if (data.shareOptions) setupShareButtons(data, itemId);
                startVerifyingTimer();
            }
        });
    }

    function embedVideo(videoUrl) {
        const videoContainer = document.getElementById('video-container');
        const videoEmbed = document.getElementById('video-embed');
        if (!videoContainer || !videoEmbed) return;
        let embedCode = '';
        if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
            let videoId = videoUrl.includes('youtube.com') ? new URL(videoUrl).searchParams.get('v') : videoUrl.split('/').pop();
            if (videoId) embedCode = `<iframe style="position: absolute; top:0; left:0; width:100%; height:100%; border:none;" src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
        } else if (videoUrl.includes('vimeo.com')) {
            const videoId = videoUrl.split('/').pop();
            embedCode = `<iframe style="position: absolute; top:0; left:0; width:100%; height:100%; border:none;" src="https://player.vimeo.com/video/${videoId}" allowfullscreen></iframe>`;
        } else if (videoUrl.includes('.mp4')) {
            embedCode = `<video style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain;" controls><source src="${videoUrl}"></video>`;
        }
        if (embedCode) { videoEmbed.innerHTML = embedCode; videoContainer.style.display = 'block'; }
    }

    async function setupShareButtons(data, itemId) {
        const shareContainer = document.getElementById('share-buttons');
        if (!shareContainer) return;
        const pageUrl = `${window.location.origin}/article.html?id=${itemId}`;
        const title = encodeURIComponent(data.title);
        let shortUrl = pageUrl;
        try { if (window.ShortlinkService) shortUrl = await window.ShortlinkService.getShortUrl(pageUrl); } catch (e) {}
        
        document.getElementById('share-facebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shortUrl)}`;
        document.getElementById('share-twitter').href = `https://twitter.com/intent/tweet?url=${encodeURIComponent(shortUrl)}&text=${title}`;
        document.getElementById('share-whatsapp').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(data.title + ' ' + shortUrl)}`;
        document.getElementById('share-telegram').href = `https://t.me/share/url?url=${encodeURIComponent(shortUrl)}&text=${title}`;
        shareContainer.style.display = 'block';
    }

    function startVerifyingTimer() {
        let timeLeft = 15;
        const timerBar = document.getElementById('timer-progress');
        const timerText = document.getElementById('timer-text');
        const claimBtn = document.getElementById('claimRewardBtn');
        const interval = setInterval(() => {
            timeLeft--;
            if(timerBar) timerBar.style.width = `${((15-timeLeft)/15)*100}%`;
            if(timerText) timerText.innerText = `Verifying Records: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                if(timerText) timerText.innerText = "✅ Record Verified!";
                if(claimBtn) {
                    claimBtn.disabled = false;
                    claimBtn.style.opacity = "1";
                    claimBtn.style.background = "#0076ff";
                    claimBtn.style.cursor = "pointer";
                    claimBtn.innerText = "Sync Hub Credits Now";
                    claimBtn.onclick = () => { if (window.HubPayout) window.HubPayout.claim(userId, reward); };
                }
            }
        }, 1000);
    }
});
</script>
</body>
</html>
