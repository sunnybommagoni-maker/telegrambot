<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Payout Tasks • Surface Hub Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=2.6.5">
    <link rel="stylesheet" href="css/responsive.css?v=2.6.5">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5388885815887025" crossorigin="anonymous"></script>
</head>

<body>
    <!-- 🏙️ GLOBAL AD CONTAINERS -->
    <div id="ad-portal-top" class="ad-top"></div>

    <div id="header-target"></div>
    <!-- 🚀 MAXIMIZE ADS: TOP BORDER AD -->
    <div style="margin: 1rem 0; text-align:center; overflow:hidden;">
    </div>
    <main class="main-layout">
        <section class="portal-main">
            <div class="portal-section"
                style="padding: 2.5rem; background: linear-gradient(135deg, #ffffff, #ecfdf5); border-bottom: 3px solid #10b981;">
                <h1 style="font-weight: 900; font-size: 2.2rem; letter-spacing: -1.5px;">Earning Optimization Hub</h1>
                <p style="color: var(--text-muted);">Complete verified portal tasks to earn instant Surface Hub credits.
                </p>
            </div>
            <div class="section-title"><i class="fas fa-tasks" style="color: #10b981;"></i> Active Hub Tasks</div>
            <div id="ad-portal-middle" class="ad-middle ad-inline"></div>


            <div class="content-grid">
                <div class="portal-card skeleton" style="height: 380px;"></div>
                <div class="portal-card skeleton" style="height: 380px;"></div>
            </div>
        </section>
        <!-- Sidebar Layout -->
        <aside class="portal-sidebar">
            <div id="ad-portal-side" class="ad-sidebar"></div>

            <div id="sidebar-target"></div>
        </aside>
    </main>
    <div id="footer-target"></div>

    <div id="ad-portal-bottom" class="ad-bottom"></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="js/navigation.js?v=2.5.5"></script>
    <script src="js/realtime.js?v=2.5.5"></script>
    <script src="js/ads-manager.js?v=1.0.0"></script>

</body>

</html>
